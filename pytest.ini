[pytest]
# =============================================================================
# pytest Configuration
# =============================================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers (defined here to suppress PytestUnknownMarkWarning)
markers =
    crud: Full CRUD lifecycle tests
    contract: Schema/contract validation tests
    smoke: Quick sanity checks against a live environment
    slo: SLO enforcement / response time boundary tests

# Output verbosity
addopts =
    --verbose
    --tb=short
    --strict-markers
    --timeout=60
    -p no:cacheprovider
    --junitxml=reports/junit.xml
    --html=reports/report.html
    --self-contained-html

# Global timeout — catches hangs OUTSIDE of HTTP calls (fixture setup, etc.)
# The HTTP client has its own per-request timeout. This is the safety net.
timeout = 60
timeout_method = thread

# Log format (pytest's built-in capture — supplementary to structlog)
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S

# =============================================================================
# .github/workflows/api-tests.yml
#
# Enterprise API Test Pipeline — Docker-Native Execution
#
# Architecture:
#   Job 1: security-audit  → pip-audit CVE scan. Blocks everything if it fails.
#   Job 2: build-image     → Build and cache the Docker image. Runs once.
#   Job 3: api-tests       → Run the suite inside the cached image.
#
# Docker layer caching strategy:
#   - The image is built once in 'build-image' and pushed to GitHub's container
#     registry (ghcr.io) with the commit SHA as the tag.
#   - 'api-tests' pulls that exact image — no rebuild, guaranteed identical env.
#   - BuildKit cache-from/cache-to reuses the pip install layer between runs,
#     cutting build time from ~90s to ~8s when only test code changes.
#
# Secret injection:
#   - Secrets come exclusively from GitHub Secrets → environment variables.
#   - They are NEVER written to disk, printed to stdout, or passed as CLI args.
#   - GitHub's log masking automatically redacts secret values from all output.
#   - The validation step checks for presence before any test runs, giving a
#     clear error message instead of a cryptic downstream failure.
#
# Artifacts (always uploaded, pass or fail — "no data disappears"):
#   - JSONL structured log  → ingestible by any SIEM
#   - HTML test report      → human-readable summary
#   - JUnit XML             → GitHub's native test result display
#
# Triggers:
#   - push to main / develop
#   - pull_request to main (blocks merge on failure)
#   - daily schedule at 06:00 UTC (catches upstream API drift)
#   - manual dispatch (environment + marker selection)
# =============================================================================

name: API Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      test_markers:
        description: "pytest markers (e.g. 'crud or contract'). Leave blank for all."
        required: false
        default: ""

# Cancel in-progress runs for the same branch on new push.
# Prevents queue buildup during rapid iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared environment — non-secret config safe to commit
# ---------------------------------------------------------------------------
env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api-test-runner
  REQUEST_CONNECT_TIMEOUT: "5"
  REQUEST_READ_TIMEOUT: "20"
  RETRY_MAX_ATTEMPTS: "3"
  RETRY_BASE_DELAY_SECONDS: "1.0"
  RETRY_MAX_DELAY_SECONDS: "30.0"
  SLO_RESPONSE_TIME_MS: "3000"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECONDS: "60"
  LOG_LEVEL: "INFO"
  LOG_FILE: "logs/test_run.jsonl"

jobs:

  # ===========================================================================
  # Job 1: CVE scan — must pass before any code runs or any image is built
  # ===========================================================================
  security-audit:
    name: "Security Audit (CVE Scan)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit dependencies for known CVEs
        # Hard fail if any dependency has a known, unpatched vulnerability.
        # --strict: exit code 1 on any finding (not just critical)
        run: pip-audit -r requirements.txt --strict

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_id }}
          path: pip-audit-report.json
          if-no-files-found: ignore
          retention-days: 90

  # ===========================================================================
  # Job 2: Build the Docker image once; cache layers for subsequent runs
  # ===========================================================================
  build-image:
    name: "Build & Cache Docker Image"
    runs-on: ubuntu-latest
    needs: security-audit

    permissions:
      contents: read
      packages: write  # Required to push to ghcr.io

    outputs:
      # Pass the exact image digest to the test job.
      # Using digest (not tag) ensures the test job runs the exact image we built,
      # not whatever 'latest' resolves to at pull time — a subtle race condition.
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker BuildKit
        uses: docker/setup-buildx-action@v3
        with:
          # BuildKit is required for --cache-from/--cache-to and multi-stage builds
          install: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided — no manual secret needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with commit SHA for exact reproducibility
            type=sha,prefix=sha-,format=short
            # Tag with branch name for human readability
            type=ref,event=branch
            # Tag 'latest' only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: read from registry cache, write back after build.
          # The 'pip install' layer is reused across runs when requirements.txt
          # is unchanged — the most expensive layer costs ~0s after first build.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false  # Suppress SBOM provenance attestation for simplicity

  # ===========================================================================
  # Job 3: Run the test suite inside the exact image we just built
  # ===========================================================================
  api-tests:
    name: "API Tests (${{ github.event.inputs.environment || 'staging' }})"
    runs-on: ubuntu-latest
    needs: build-image

    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      packages: read
      checks: write       # Required by publish-unit-test-result-action
      pull-requests: write # Required to post PR comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create output directories on host
        # These are bind-mounted into the container so artifacts survive exit
        run: mkdir -p logs reports

      # -----------------------------------------------------------------------
      # Validate secrets before spending time on anything else.
      # A clear error here beats a cryptic failure 30 tests in.
      # -----------------------------------------------------------------------
      - name: Validate required GitHub Secrets are configured
        env:
          _CHECK_URL: ${{ secrets.API_BASE_URL }}
          _CHECK_USER: ${{ secrets.API_USERNAME }}
          _CHECK_PASS: ${{ secrets.API_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          required = {
              "API_BASE_URL": os.environ.get("_CHECK_URL"),
              "API_USERNAME": os.environ.get("_CHECK_USER"),
              "API_PASSWORD": os.environ.get("_CHECK_PASS"),
          }
          missing = [k for k, v in required.items() if not v]
          if missing:
              print(f"::error::Missing GitHub Secrets: {missing}")
              print("Configure at: Settings → Secrets and variables → Actions")
              sys.exit(1)
          print("✅ All required secrets are present.")
          PYEOF

      # -----------------------------------------------------------------------
      # Run tests inside the Docker image built in job 2.
      # Using --digest ensures we run the EXACT image from the build job,
      # not a newer image that may have been pushed concurrently.
      #
      # Secrets are passed via --env flags — never written to disk.
      # -----------------------------------------------------------------------
      - name: Run API test suite in Docker
        env:
          # Secrets from GitHub — passed to docker run as env vars
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          # Determine optional marker flag
          MARKER_FLAG=""
          if [ -n "${{ github.event.inputs.test_markers }}" ]; then
            MARKER_FLAG="-m '${{ github.event.inputs.test_markers }}'"
          fi

          docker run \
            --rm \
            --name api-test-runner-${{ github.run_id }} \
            \
            --env API_BASE_URL="${API_BASE_URL}" \
            --env API_USERNAME="${API_USERNAME}" \
            --env API_PASSWORD="${API_PASSWORD}" \
            --env API_TOKEN="${API_TOKEN}" \
            \
            --env REQUEST_CONNECT_TIMEOUT="${{ env.REQUEST_CONNECT_TIMEOUT }}" \
            --env REQUEST_READ_TIMEOUT="${{ env.REQUEST_READ_TIMEOUT }}" \
            --env RETRY_MAX_ATTEMPTS="${{ env.RETRY_MAX_ATTEMPTS }}" \
            --env RETRY_BASE_DELAY_SECONDS="${{ env.RETRY_BASE_DELAY_SECONDS }}" \
            --env RETRY_MAX_DELAY_SECONDS="${{ env.RETRY_MAX_DELAY_SECONDS }}" \
            --env SLO_RESPONSE_TIME_MS="${{ env.SLO_RESPONSE_TIME_MS }}" \
            --env CIRCUIT_BREAKER_FAILURE_THRESHOLD="${{ env.CIRCUIT_BREAKER_FAILURE_THRESHOLD }}" \
            --env CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECONDS="${{ env.CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECONDS }}" \
            --env LOG_LEVEL="${{ env.LOG_LEVEL }}" \
            --env LOG_FILE="${{ env.LOG_FILE }}" \
            --env PYTHONUNBUFFERED=1 \
            \
            --volume "$(pwd)/logs:/app/logs" \
            --volume "$(pwd)/reports:/app/reports" \
            \
            --memory="512m" \
            --cpus="2" \
            \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}" \
            python -m pytest --tb=short --verbose --timeout=60 $MARKER_FLAG

      # -----------------------------------------------------------------------
      # Artifact upload — ALWAYS runs, even on test failure.
      # This is the "no data disappears into the void" CI guarantee.
      # A failed run without logs is an unresolvable failure.
      # -----------------------------------------------------------------------
      - name: Upload structured JSONL logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: logs/test_run.jsonl
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: reports/report.html
          retention-days: 14
          if-no-files-found: warn

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: reports/junit.xml
          retention-days: 30
          if-no-files-found: warn

      # Publishes results to GitHub's native Checks tab and PR status
      - name: Publish test results to GitHub Checks
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          comment_mode: always
          check_run_annotations: all tests, skipped tests
          job_summary: true

      # -----------------------------------------------------------------------
      # Post a structured failure comment on the PR so reviewers have
      # immediate context without navigating to the Actions tab.
      # -----------------------------------------------------------------------
      - name: Post failure summary to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            const body = [
              '## ❌ API Test Suite — Failed',
              '',
              `| Field | Value |`,
              `|---|---|`,
              `| **Run** | [#${context.runId}](${runUrl}) |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Environment** | ${{ github.event.inputs.environment || 'staging' }} |`,
              `| **Triggered by** | ${context.actor} |`,
              '',
              '**Artifacts available in the run above:**',
              '- `test-logs-*.jsonl` — Full structured log with request/response details',
              '- `html-report-*.html` — Visual test report',
              '',
              '> This PR cannot be merged until all API tests pass.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ===========================================================================
  # Job 4 (scheduled only): Notify on daily regression run failures
  # ===========================================================================
  notify-regression-failure:
    name: "Notify: Daily Regression Failure"
    runs-on: ubuntu-latest
    needs: api-tests
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Create GitHub Issue for regression failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Daily API Regression Failure — ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Daily Regression Test Failure',
                '',
                'The scheduled daily API test run has failed. This may indicate:',
                '- A breaking change in the upstream API (schema drift, new authentication requirement)',
                '- An infrastructure issue with the target environment',
                '- A flaky test that needs investigation',
                '',
                `**Run:** [#${context.runId}](${runUrl})`,
                '',
                'Structured logs and HTML report are available as artifacts in the run linked above.',
                '',
                'This issue was automatically created by the CI pipeline.',
              ].join('\n'),
              labels: ['regression', 'automated', 'needs-triage'],
            });
